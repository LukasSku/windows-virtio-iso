name: Build Windows Server 2025 VirtIO ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install required packages (wimtools, mkisofs, p7zip)
        run: |
          sudo apt-get update
          sudo apt-get install -y wimtools genisoimage p7zip-full

      - name: Download Windows Server 2025 Evaluation ISO
        # Dies ist der offizielle Microsoft-Link für die 2025 Standard Evaluation
        run: wget -O win.iso "https://software-static.download.prss.microsoft.com/dbazure/988969d5-f34g-4e03-90d5-5796a30fbf0c/26100.1742.240906-0331.ge_release_svc_refresh_SERVER_EVAL_x64FRE_en-us.iso"

      - name: Download VirtIO Drivers (Stable)
        run: wget -O virtio.iso "https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/virtio-win.iso"

      - name: Extract ISOs
        run: |
          mkdir -p win_extracted virtio_extracted
          7z x win.iso -owin_extracted
          7z x virtio.iso -ovirtio_extracted
          
      - name: Mount and Inject VirtIO Drivers into boot.wim (Setup Environment)
        run: |
          mkdir mount
          sudo wimmountrw win_extracted/sources/boot.wim 2 mount
          # Injiziere die Treiber (2k25 oder fallback auf 2k22)
          sudo cp -r virtio_extracted/viostor/2k22/amd64/* mount/
          sudo wimunmount --commit mount

      - name: Mount and Inject VirtIO Drivers into install.wim (The OS itself)
        run: |
          sudo wimmountrw win_extracted/sources/install.wim 2 mount
          sudo cp -r virtio_extracted/viostor/2k22/amd64/* mount/
          sudo wimunmount --commit mount
          rm -rf mount

      - name: Create new slipstreamed ISO
        run: |
          cd win_extracted
          mkisofs -b boot/etfsboot.com -no-emul-boot -c BOOT.CAT -iso-level 4 -J -l -D -N -joliet-long -relaxed-filenames -V "WIN_SERVER_2025_VIRTIO" -udf -boot-info-table -eltorito-alt-boot -e efi/microsoft/boot/efisys.bin -no-emul-boot -o ../WinServer2025_VirtIO.iso .
          cd ..

      - name: Upload ISO as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinServer2025_VirtIO
          path: WinServer2025_VirtIO.iso
          retention-days: 1
