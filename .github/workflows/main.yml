name: Build Windows Server VirtIO ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install required packages (wimtools, mkisofs, p7zip)
        run: |
          sudo apt-get update
          sudo apt-get install -y wimtools genisoimage p7zip-full

      - name: Download Windows Server Evaluation ISO
        run: wget -O win.iso "https://go.microsoft.com/fwlink/?linkid=2345730&clcid=0x407&culture=de-de&country=de"

      - name: Download VirtIO Drivers (Stable)
        run: wget -O virtio.iso "https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/virtio-win.iso"

      - name: Extract ISOs
        run: |
          mkdir -p win_extracted virtio_extracted
          7z x win.iso -owin_extracted
          7z x virtio.iso -ovirtio_extracted
          
      - name: Mount and Inject VirtIO Drivers into boot.wim (Setup Environment)
        run: |
          mkdir mount
          sudo wimmountrw win_extracted/sources/boot.wim 2 mount
          sudo cp -r virtio_extracted/viostor/2k22/amd64/* mount/
          sudo wimunmount --commit mount

      - name: Mount and Inject VirtIO Drivers into install.wim (The OS itself)
        run: |
          sudo wimmountrw win_extracted/sources/install.wim 2 mount
          sudo cp -r virtio_extracted/viostor/2k22/amd64/* mount/
          sudo wimunmount --commit mount
          rm -rf mount

      - name: Create new slipstreamed ISO
        run: |
          cd win_extracted
          mkisofs -b boot/etfsboot.com -no-emul-boot -c BOOT.CAT -iso-level 4 -J -l -D -N -joliet-long -relaxed-filenames -allow-limited-size -V "WIN_SERVER_VIRTIO" -udf -boot-info-table -eltorito-alt-boot -e efi/microsoft/boot/efisys.bin -no-emul-boot -o ../WinServer_VirtIO.iso .
          cd ..

      - name: Upload ISO to File Hoster
        run: |
          echo "=== STARTE UPLOAD ZU BASHUPLOAD ==="
          echo "Bitte warten, der Upload dauert ca. 2-4 Minuten..."
          curl -T ../WinServer_VirtIO.iso https://bashupload.com/WinServer_VirtIO.iso
          
          echo ""
          echo "=== STARTE BACKUP-UPLOAD ZU TRANSFER.SH ==="
          echo "Falls der erste Hoster fehlschlägt, hier der zweite Link:"
          curl --upload-file ../WinServer_VirtIO.iso https://transfer.sh/WinServer_VirtIO.iso
